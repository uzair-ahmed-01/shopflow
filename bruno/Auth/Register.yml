info:
  name: Register
  type: http

http:
  method: POST
  url: http://localhost:8080/api/v1/auth/register
  body:
    type: json
    data: |-
      {
          "name" : "zeeshan",
          "password" : "12345678",
          "email":"zeeshan@gmail.com"
      }   
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
