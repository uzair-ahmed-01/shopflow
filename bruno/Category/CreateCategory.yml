info:
  name: CreateCategory
  type: http

http:
  method: POST
  url: http://localhost:8080/api/v1/categories
  body:
    type: json
    data: |-
      {
          "name": "Electronics",
          "description": "Smartphones, Laptops, Accessories"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
